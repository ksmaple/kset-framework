services:
  cat:
    build:
      context: .
      dockerfile: Dockerfile
    image: kset-cat:local
    container_name: kset-cat
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_URL: mysql
      MYSQL_PORT: "3306"
      MYSQL_USERNAME: root
      MYSQL_PASSWD: ""
      MYSQL_SCHEMA: cat
      CAT_SERVERS: 127.0.0.1:${CAT_TCP_PORT:-2280}:${CAT_HTTP_PORT:-8088}
      CAT_JOB_MACHINE: "true"
      CAT_ALERT_MACHINE: "true"
      TZ: Asia/Shanghai
    volumes:
      - ./appdatas:/data/appdatas/cat
      - ../config/cat/client.xml:/data/appdatas/cat/client.xml:ro
    ports:
      - "${CAT_HTTP_PORT:-8088}:8080"
      - "${CAT_TCP_PORT:-2280}:2280"
    networks:
      - kset-cat
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/cat/r/home >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  mysql:
    image: ${CAT_MYSQL_IMAGE:-mysql:5.7.37}
    container_name: kset-cat-mysql
    restart: unless-stopped
    command:
      - mysqld
      - -uroot
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --init-connect=SET NAMES utf8mb4;
      - --innodb-flush-log-at-trx-commit=0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "true"
      MYSQL_DATABASE: cat
      TZ: Asia/Shanghai
    ports:
      - "${CAT_MYSQL_PORT:-3307}:3306"
    volumes:
      - ./mysql/volume:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - kset-cat
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

networks:
  kset-cat:
    name: kset-cat
