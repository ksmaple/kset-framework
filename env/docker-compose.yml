services:
  nacos:
    image: ${NACOS_IMAGE:-nacos/nacos-server:v2.3.2}
    container_name: kset-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "${NACOS_HTTP_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
      - "${NACOS_RAFT_PORT:-9849}:9849"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    networks:
      - kset-env

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: kset-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kset_demo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kset_demo"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kset-env

  redis:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: kset-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kset-env

networks:
  kset-env:
    name: kset-env

volumes:
  nacos-data:
  nacos-logs:
  postgres-data:
  redis-data:
