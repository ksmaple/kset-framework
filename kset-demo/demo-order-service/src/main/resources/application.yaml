spring:
  application:
    name: demo-order-service
  datasource:
    url: jdbc:mysql://localhost:3306/kset_demo?useSSL=false&serverTimezone=UTC
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: dev
        group: KSET_GROUP
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: dev
        group: KSET_GROUP
  config:
    import: optional:nacos:${spring.application.name}.yaml

server:
  port: 8082

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: 20882
  registry:
    address: nacos://${NACOS_ADDR:127.0.0.1:8848}

kset:
  redis:
    key-prefix: "demo-order:"

knife4j:
  enable: true
