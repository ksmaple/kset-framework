spring:
  application:
    name: demo-standalone-service
  datasource:
    url: jdbc:mysql://localhost:3306/kset_demo?useSSL=false&serverTimezone=UTC
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

kset:
  web:
    knife4j:
      enabled: true
  mysql:
    enabled: true
    auto-fill: true
    flyway:
      enabled: true
  redis:
    key-prefix: "demo-standalone:"

knife4j:
  enable: true
  setting:
    language: zh_cn
