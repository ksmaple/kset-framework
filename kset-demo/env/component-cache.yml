# Cache 组件配置

# 来源：KSet Cache Starter。
# 说明：引入 kset-starter-cache 后默认启用；有 Redis L2 时会自动注册二级缓存 Store。
# 非必选项：需要调整缓存策略时再打开。
# kset:
#   cache:
#     enabled: true
#     default-layers:
#       - L1
#       - L2
#     cache-null: true
#     null-ttl: 1m
#     single-flight-enabled: true
#     l1:
#       enabled: true
#       default-ttl: 5m
#       initial-capacity: 128
#       maximum-size: 10000
#       record-stats: false
#     l2:
#       default-ttl: 30m
