# Monitor 组件配置

# 来源：KSet Monitor Starter。
# 说明：默认后端为本地 LogBackend；叠加本文件后切换为 CAT 后端。
kset:
  monitor:
    # 含义：选择监控后端；cat 表示使用 CAT。
    backend: cat
    cat:
      # 含义：启动时主动初始化 CAT 客户端。
      initialize: true
      # 非必选项：默认优先使用 spring.application.name 作为 CAT domain。
      # domain: ${spring.application.name:kset-local-demo}

    # 非必选项：默认均由 starter 自动装配；需要改变默认行为时再打开。
    # sampler:
    #   rate: 1.0
    # servlet:
    #   trace-enabled: true
    #   gray-tag-enabled: true
    # dubbo:
    #   enabled: true
    # gateway:
    #   enabled: true
    #   trace-enabled: true
    # mybatis:
    #   enabled: true
    # http-client:
    #   enabled: true
    # redis:
    #   enabled: true
