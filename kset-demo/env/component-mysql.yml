# MySQL 组件配置
#
# 来源：Spring Boot DataSourceProperties / HikariCP。
# 含义：单数据源模式使用 Spring Boot 原生 spring.datasource.*；启用多数据源时请改用 component-datasource-dynamic.yml。
spring:
  datasource:
    # 来源：Spring Boot DataSourceProperties.url；含义：本地 MySQL 连接地址。
    url: jdbc:mysql://127.0.0.1:3306/kset_demo?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    # 来源：Spring Boot DataSourceProperties.username；含义：本地 MySQL 用户名。
    username: root
    # 来源：Spring Boot DataSourceProperties.password；含义：本地 MySQL 密码，仅用于 demo。
    password: root
    # 来源：Spring Boot DataSourceProperties.driverClassName；含义：JDBC 驱动类，Spring Boot 通常可从 URL 推断。
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # 来源：spring.datasource.hikari 原生配置；含义：HikariCP 连接池常用参数。
    # hikari:
    #   pool-name: kset-demo-mysql-hikari
    #   minimum-idle: 5
    #   maximum-pool-size: 20
    #   idle-timeout: 600000
    #   max-lifetime: 1800000
    #   connection-timeout: 30000
    #   validation-timeout: 5000
    #   connection-test-query: SELECT 1

# 来源：MyBatis-Plus / MyBatis 原生配置。
# 含义：覆盖 mapper、枚举、驼峰映射、逻辑删除等行为时打开。
# mybatis-plus:
#   mapper-locations: classpath*:/mapper/**/*.xml
