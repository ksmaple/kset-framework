# Redis 组件配置

# 来源：Spring Boot RedisProperties。
spring:
  data:
    redis:
      # 含义：本地 Redis 主机地址。
      host: 127.0.0.1
      # 含义：本地 Redis 端口。
      port: 6379
      # 含义：Redis 逻辑库编号。
      database: 0
      # 非必选项：Redis 命令超时时间。
      # timeout: 2s
      # 非必选项：Redis 用户名，Redis ACL 场景使用。
      # username: default
      # 非必选项：Redis 密码，本地 demo 默认不需要。
      # password:
      # 非必选项：启用 SSL/TLS 连接。
      # ssl:
      #   enabled: false
      # 非必选项：Lettuce 客户端连接池参数，需要 commons-pool2 依赖。
      # lettuce:
      #   pool:
      #     enabled: true
      #     max-active: 8
      #     max-idle: 8
      #     min-idle: 0
      #     max-wait: 2s
      #   shutdown-timeout: 100ms
      # 非必选项：Redis Cluster 参数。
      # cluster:
      #   nodes:
      #     - 127.0.0.1:6379
      #   max-redirects: 3
      # 非必选项：Redis Sentinel 参数。
      # sentinel:
      #   master: mymaster
      #   nodes:
      #     - 127.0.0.1:26379

# 来源：KSet Redis Starter。
# 非必选项：默认启用，key-prefix 会按 spring.application.name 自动派生，default-ttl 默认 30m。
# kset:
#   redis:
#     enabled: true
#     key-prefix: "kset:${spring.application.name}:"
#     default-ttl: 30m
#     max-ttl: 7d
