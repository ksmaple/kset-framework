# Redisson 分布式锁组件配置

# 来源：KSet Redis Starter，底层使用 Redisson 开源客户端。
kset:
  redis:
    redisson:
      # RedissonClient 默认自动装配；不需要分布式锁时设置为 false。
      # enabled: false
      # 非必选项：默认锁等待时间。
      # lock-wait-time: 3s
      # 非必选项：默认锁租约时间。
      # lock-lease-time: 30s
      # 非必选项：Redisson worker 线程数。
      # threads: 16
      # 非必选项：Redisson Netty 线程数。
      # netty-threads: 32
    lock:
      # 非必选项：默认启用 @KsetLocked 注解锁 AOP。
      # annotation-enabled: true
      # 非必选项：默认启动时检查注解锁不可织入场景。
      # validate-targets: true
