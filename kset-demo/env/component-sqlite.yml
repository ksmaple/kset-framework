# SQLite 组件配置
#
# 来源：Spring Boot DataSourceProperties / HikariCP。
# 含义：单数据源模式使用 Spring Boot 原生 spring.datasource.*；启用多数据源时请改用 component-datasource-dynamic.yml。
spring:
  datasource:
    # 来源：Spring Boot DataSourceProperties.url；含义：本地 SQLite 数据库文件地址。
    url: jdbc:sqlite:./data/kset_demo.db
    # 来源：Spring Boot DataSourceProperties.username；含义：SQLite 通常不需要用户名。
    # username:
    # 来源：Spring Boot DataSourceProperties.password；含义：SQLite 通常不需要密码。
    # password:
    # 来源：Spring Boot DataSourceProperties.driverClassName；含义：JDBC 驱动类，Spring Boot 通常可从 URL 推断。
    # driver-class-name: org.sqlite.JDBC
    # 来源：spring.datasource.hikari 原生配置；含义：HikariCP 连接池常用参数，SQLite 建议保持较小连接池。
    # hikari:
    #   pool-name: kset-demo-sqlite-hikari
    #   minimum-idle: 1
    #   maximum-pool-size: 5
    #   connection-timeout: 30000
    #   validation-timeout: 5000
    #   connection-test-query: SELECT 1

# 来源：Flyway / Spring Boot FlywayProperties。
# 含义：数据库迁移配置，只有需要自动迁移时打开。
# spring:
#   flyway:
#     enabled: true
#     baseline-on-migrate: true
#     locations: classpath:db/migration/sqlite
#     table: flyway_schema_history
#     out-of-order: false

# 来源：MyBatis-Plus / MyBatis 原生配置。
# 含义：覆盖 mapper、枚举、驼峰映射、逻辑删除等行为时打开。
# mybatis-plus:
#   mapper-locations: classpath*:/mapper/**/*.xml
#   type-aliases-package: com.kset.demo
#   configuration:
#     map-underscore-to-camel-case: true
#     log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
#   global-config:
#     db-config:
#       logic-delete-field: deleted
#       logic-delete-value: 1
#       logic-not-delete-value: 0

# 来源：KSet Datasource Starter / SQLite JDBC 驱动。
# 含义：通用 JDBC、MyBatis-Plus、Flyway 能力由 datasource 组件提供，SQLite 驱动由业务依赖显式引入。
# kset:
#   datasource:
#     enabled: true
#     auto-fill: true
